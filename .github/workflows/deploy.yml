# Build the Docusaurus site and deploy it to GitHub Pages.
#
# This is the GitHub Pages half of the dual-hosting setup (Firebase Hosting is
# the other half — see firebase.json / .firebaserc). DEPLOY IS OWNER-ENABLED:
# it only runs after you enable Pages for this repo (Settings -> Pages ->
# Source: "GitHub Actions") and keep the custom domain (static/CNAME ->
# unified-tracking-docs.aoneahsan.com). Until Pages is enabled the deploy job
# is a no-op in a fork/clone. You can also trigger it manually from the Actions
# tab (workflow_dispatch).

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build site
        run: yarn build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
